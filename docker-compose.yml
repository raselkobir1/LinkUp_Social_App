version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: linkup-postgres
    environment:
      POSTGRES_USER: linkup
      POSTGRES_PASSWORD: linkup@123
      POSTGRES_DB: LinkUpDb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U linkup -d LinkUpDb"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: linkup-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  linkup-api:
    build:
      context: .
      dockerfile: src/API/Dockerfile
    container_name: linkup-api
    ports:
      - "5000:8080"
      - "5001:8081"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__Default=Host=postgres;Database=LinkUpDb;Username=linkup;Password=linkup@123
      - Redis__ConnectionString=redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
