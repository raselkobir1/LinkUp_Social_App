<div class="max-w-2xl mx-auto px-4 py-6">

  <!-- Create Post -->
  <app-create-post (postCreated)="onPostCreated($event)" class="mb-4 block" />

  <!-- Loading -->
  @if (loading()) {
    <div class="flex justify-center py-10">
      <mat-spinner diameter="40"></mat-spinner>
    </div>
  }

  <!-- Posts -->
  @for (post of posts(); track post.id) {
    <app-post-card
      [post]="post"
      class="mb-4 block"
      (postDeleted)="onPostDeleted($event)"
      (postUpdated)="onPostUpdated($event)"
      (postShared)="onPostCreated($event)">
    </app-post-card>
  }

  @if (!loading() && posts().length === 0) {
    <div class="text-center py-16 text-gray-400">
      <p class="text-lg">Your feed is empty.</p>
      <p class="text-sm mt-1">Add some friends to see their posts here.</p>
    </div>
  }

  <!-- Infinite scroll sentinel: when it nears the viewport the next page auto-loads -->
  <div #sentinel></div>

  @if (loadingMore()) {
    <div class="flex justify-center py-6">
      <mat-spinner diameter="28"></mat-spinner>
    </div>
  }

  @if (!hasMore && !loading() && posts().length > 0) {
    <p class="text-center text-gray-400 text-sm py-6">You're all caught up 🎉</p>
  }
</div>
